<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trend and entertainment reels portfolio folder." />
  <meta name="theme-color" content="#08090b" />
  <title>Trend / Entertainment Reels</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#08090b',
            panel: '#101216',
            steel: '#aab2bf',
            cloud: '#f6f7fb',
            signal: '#3dd6c6'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'Segoe UI', 'Arial', 'sans-serif']
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(255,255,255,.08), 0 24px 80px rgba(0,0,0,.45)'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      background:
        radial-gradient(circle at 18% 10%, rgba(61, 214, 198, .12), transparent 28rem),
        radial-gradient(circle at 82% 18%, rgba(244, 184, 96, .10), transparent 26rem),
        linear-gradient(180deg, #08090b 0%, #0c0d10 46%, #08090b 100%);
      color: #f6f7fb;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .noise::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
    }
  </style>
</head>
<body class="noise min-h-screen overflow-x-hidden">
  <main class="px-5 py-10 lg:px-8">
    <div class="mx-auto max-w-7xl">
      <div class="mb-10 flex flex-col justify-between gap-5 border-b border-white/10 pb-8 md:flex-row md:items-end">
        <div>
          <a class="inline-flex rounded-full border border-white/15 px-4 py-2 text-sm font-bold text-cloud hover:border-signal/70 hover:bg-signal/10" href="index.html#work">Back to portfolio</a>
          <p class="mt-8 text-sm font-bold uppercase tracking-[.22em] text-signal">Portfolio folder</p>
          <h1 class="mt-4 text-4xl font-extrabold tracking-tight text-cloud sm:text-6xl">Trend / Entertainment Reels</h1>
        </div>
        <p class="max-w-xl text-steel">Fast hooks, trend-aware pacing, expressive captions, SFX, and visual rhythm built for short attention spans.</p>
      </div>

      <section class="grid justify-items-center gap-6 sm:grid-cols-2 lg:grid-cols-3" aria-label="Trend and entertainment reels video gallery">
        <article class="glass w-full max-w-[340px] overflow-hidden rounded-3xl">
          <video class="aspect-[9/16] w-full bg-black object-cover" controls preload="metadata" poster="thumbnails/trend-entertainment-reels.jpg">
            <source src="videos/trend-reels/the-one-decision.mp4" type="video/mp4" />
          </video>
          <div class="p-5">
            <h2 class="text-xl font-bold text-cloud">The One Decision</h2>
          </div>
        </article>
      </section>
    </div>
  </main>
</body>
</html>
